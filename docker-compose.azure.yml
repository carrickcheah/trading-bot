# Production stack on Azure VM (eastus2). Sibling to ai-trader.
# - trading-bot-py: FastAPI on :8002 + cron-driven scanner
# - trading-bot-frontend: Bun + Hono + React on :3001 (proxies /api/* → trading-bot-py)
#
# Access from laptop via SSH tunnel:
#   ssh -i infra/ssh_key -L 3001:localhost:3001 azureuser@<vm-ip>
#   open http://localhost:3001 in your browser

services:
  trading-bot-py:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: trading-bot-py
    restart: always
    volumes:
      - /opt/trading-bot/data/bars:/data/bars:ro
      - trading-bot-db:/data/db
    ports:
      - "127.0.0.1:8002:8002"
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8002/api/health').read()"]
      interval: 30s
      timeout: 5s
      retries: 5
      start_period: 30s

  trading-bot-frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: trading-bot-frontend
    restart: always
    depends_on:
      - trading-bot-py
    environment:
      API_URL: http://trading-bot-py:8002
      PORT: "3001"
    ports:
      - "127.0.0.1:3001:3001"

volumes:
  trading-bot-db:
